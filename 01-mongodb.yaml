- name: configuring mongodb server
  hosts: mongodb
  becomes: yes
  tasks:
  - name: copy mongodb repo
    copy:
     src: mongo.repo
     dest: /etc/yum.repos.d/mongo.repo
  - name: install mangodb
    package:
      name: mangodb-org
      state: present
  - name: allowing remote connections
    replace:
     path: /etc/mongod.conf
     regexp: '127.0.0.1'
     replace: '0.0.0.0'
  - name: start and restart mongodb
    service:
      name: mongodb
      state: restarted
      enabled: yes
