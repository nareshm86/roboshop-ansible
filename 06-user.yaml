- name: configuration of user service
  hosts: user
  become: yes
  tasks:
  - name: enable node js 20 version
    command: dnf module enable nodejs:20 -y
  
  - name: install node js
    package:
     name: nodejs
     state: present
  
  - name: creating systmem user
    user:
      name: roboshop
      system: true
      shell: /sbin/nologin
      home: /app
      comment: "roboshop system user"
    tags: roboshopuser
  
  - name: deleting /app directory
    file:
     path: /app
     state: absent

  - name: deleting  user zip file from tmp directory
    file:
     path: /tmp/user.zip
     state: absent
  
  - name: creating /app directory
    file:
      path: /app
      state: directory
    tags: appdir

  - name: downloanding user code
    get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
     dest: /tmp/user.zip

  - name: unzipping user file
    unarchive:
     src: /tmp/user.zip
     dest: /app
     remote_src: yes 

  - name: install npm dependencies
    community.general.npm:
     path: /app
     state: present
  
  - name: copying SystemD User Service file
    template:
     src: user.service.j2
     dest: /etc/systemd/system/user.service

  - name: daemon reload
    systemd_service:
     name: user
     daemon_reload: true

  - name: restart and enable user service
    service:
     name: user
     state: restarted
     enabled: yes


     