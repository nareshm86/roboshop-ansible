- name: configuring payment server
  hosts: payment
  become: yes
  tasks:
  - name: install Python
    package:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: create roboshop system user
    user:
     name: roboshop
     system: yes
     home: /app
     shell: /sbin/nologin
     comment: "roboshop system user"
     state: present
  
  - name: remove /app directory
    file:
     path: /app
     state: absent
  
  - name: deleting payment.zip in tmp directory
    file:
      path: /tmp/payment.zip
      state: absent

  - name: create app directory
    file:
     path: /app
     state: directory

  - name: download shipping application url
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
  
  - name: unzip file
    unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: install python dependencies
    pip:
     requirements: requirements.txt
     executable: pip3.9
    args:
      chdir: /app

  - name: copy payment service
    template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service
    tags: paymentsrv
  
  - name: copy payment service
    template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service
    tags: payser
  
  - name: daemon reload
    systemd_service:
      name: payment
      daemon_reload: true

  - name: start and enable payment service
    service:
      name: payment
      state: restarted
    tags: paymentst